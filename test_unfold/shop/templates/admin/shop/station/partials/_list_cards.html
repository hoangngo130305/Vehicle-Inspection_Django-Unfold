<!-- Summary Cards -->
<div class="dk-cards">
    <div class="dk-card dk-card-blue">
        <div class="dk-card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
        </div>
        <div class="dk-card-number">{{ total_stations }}</div>
        <div class="dk-card-label">Tổng số trạm</div>
    </div>
    <div class="dk-card dk-card-green">
        <div class="dk-card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
        </div>
        <div class="dk-card-number">{{ active_stations }}</div>
        <div class="dk-card-label">Đang hoạt động</div>
    </div>
    <div class="dk-card dk-card-red">
        <div class="dk-card-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
                <circle cx="12" cy="10" r="3" />
            </svg>
        </div>
        <div class="dk-card-number">{{ inactive_stations }}</div>
        <div class="dk-card-label">Ngừng hoạt động</div>
    </div>
</div>
