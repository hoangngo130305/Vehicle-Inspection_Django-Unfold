<!-- ======== Modal: Thêm trạm ======== -->
<div id="addStationModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:9999;">
    <!-- Backdrop -->
    <div id="modalBackdrop"
        style="position:absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); backdrop-filter:blur(2px);">
    </div>

    <!-- Modal Content -->
    <div
        style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#fff; border-radius:12px; box-shadow:0 25px 60px rgba(0,0,0,0.3); width:560px; max-width:95vw; max-height:90vh; overflow-y:auto; animation: modalSlideIn 0.25s ease-out;">

        <!-- Header -->
        <div
            style="display:flex; align-items:center; justify-content:space-between; padding:24px 28px 16px; border-bottom:1px solid #e5e7eb;">
            <h2 style="margin:0; font-size:20px; font-weight:700; color:#1f2937;">Thêm trạm đăng kiểm mới</h2>
            <button type="button" id="closeModalBtn"
                style="background:none; border:none; cursor:pointer; font-size:24px; color:#6b7280; padding:4px; line-height:1; border-radius:6px; transition:all 0.15s;"
                onmouseover="this.style.background='#f3f4f6'; this.style.color='#1f2937'"
                onmouseout="this.style.background='none'; this.style.color='#6b7280'">✕</button>
        </div>

        <!-- Form -->
        <form id="addStationForm" method="post" style="padding:20px 28px 28px;">
            {% csrf_token %}

            <!-- Tên trạm -->
            <div style="margin-bottom:18px;">
                <label style="display:block; font-size:14px; font-weight:600; color:#374151; margin-bottom:6px;">
                    Tên trạm <span style="color:#dc2626;">*</span>
                </label>
                <input type="text" name="station_name" required placeholder="VD: Trạm Đăng kiểm Hà Nội"
                    style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; color:#1f2937; outline:none; transition:border-color 0.15s, box-shadow 0.15s; box-sizing:border-box;"
                    onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59,130,246,0.12)'"
                    onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'" />
            </div>

            <!-- Địa chỉ -->
            <div style="margin-bottom:18px;">
                <label style="display:block; font-size:14px; font-weight:600; color:#374151; margin-bottom:6px;">
                    Địa chỉ <span style="color:#dc2626;">*</span>
                </label>
                <input type="text" name="address" required placeholder="VD: 123 Nguyễn Trãi, Thanh Xuân, Hà Nội"
                    style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; color:#1f2937; outline:none; transition:border-color 0.15s, box-shadow 0.15s; box-sizing:border-box;"
                    onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59,130,246,0.12)'"
                    onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'" />
            </div>

            <!-- Latitude & Longitude -->
            <div style="display:flex; gap:16px; margin-bottom:18px;">
                <div style="flex:1;">
                    <label style="display:block; font-size:14px; font-weight:600; color:#374151; margin-bottom:6px;">
                        Latitude <span style="color:#dc2626;">*</span> <span
                            style="font-weight:400; color:#6b7280; font-size:13px;">(-90 đến 90)</span>
                    </label>
                    <input type="number" name="latitude" required step="any" min="-90" max="90"
                        placeholder="VD: 21.0285"
                        style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; color:#1f2937; outline:none; transition:border-color 0.15s, box-shadow 0.15s; box-sizing:border-box;"
                        onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59,130,246,0.12)'"
                        onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'" />
                </div>
                <div style="flex:1;">
                    <label style="display:block; font-size:14px; font-weight:600; color:#374151; margin-bottom:6px;">
                        Longitude <span style="color:#dc2626;">*</span> <span
                            style="font-weight:400; color:#6b7280; font-size:13px;">(-180 đến 180)</span>
                    </label>
                    <input type="number" name="longitude" required step="any" min="-180" max="180"
                        placeholder="VD: 105.8542"
                        style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; color:#1f2937; outline:none; transition:border-color 0.15s, box-shadow 0.15s; box-sizing:border-box;"
                        onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59,130,246,0.12)'"
                        onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'" />
                </div>
            </div>

            <!-- Số điện thoại -->
            <div style="margin-bottom:18px;">
                <label style="display:block; font-size:14px; font-weight:600; color:#374151; margin-bottom:6px;">
                    Số điện thoại <span style="color:#dc2626;">*</span>
                </label>
                <input type="text" name="phone" required placeholder="VD: 024 1234 5678"
                    style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; color:#1f2937; outline:none; transition:border-color 0.15s, box-shadow 0.15s; box-sizing:border-box;"
                    onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59,130,246,0.12)'"
                    onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'" />
            </div>

            <!-- Trạng thái -->
            <div style="margin-bottom:22px;">
                <label style="display:block; font-size:14px; font-weight:600; color:#374151; margin-bottom:6px;">
                    Trạng thái
                </label>
                <div style="position:relative;">
                    <select name="status"
                        style="width:100%; padding:10px 14px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; color:#1f2937; outline:none; transition:border-color 0.15s, box-shadow 0.15s; box-sizing:border-box; appearance:none; background:#fff; cursor:pointer; padding-right:36px;"
                        onfocus="this.style.borderColor='#3b82f6'; this.style.boxShadow='0 0 0 3px rgba(59,130,246,0.12)'"
                        onblur="this.style.borderColor='#d1d5db'; this.style.boxShadow='none'">
                        <option value="active" selected>Hoạt động</option>
                        <option value="inactive">Ngừng hoạt động</option>
                        <option value="maintenance">Bảo trì</option>
                    </select>
                    <span
                        style="position:absolute; right:12px; top:50%; transform:translateY(-50%); pointer-events:none; color:#6b7280; font-size:18px;">˅</span>
                </div>
            </div>

            <!-- GPS Note -->
            <div
                style="background:#eff6ff; border:1px solid #bfdbfe; border-radius:8px; padding:14px 16px; margin-bottom:24px;">
                <p style="margin:0; font-size:13px; color:#1e40af; line-height:1.6;">
                    <strong style="color:#1e3a5f;">Lưu ý:</strong> Latitude và Longitude là tọa độ GPS của trạm, cần
                    thiết để hiển thị trên bản đồ. Bạn có thể lấy tọa độ từ Google Maps bằng cách nhấp chuột phải vào vị
                    trí và chọn "Copy coordinates".
                </p>
            </div>

            <!-- Action Buttons -->
            <div style="display:flex; gap:12px; justify-content:flex-end;">
                <button type="button" id="cancelModalBtn"
                    style="padding:10px 22px; border:1px solid #d1d5db; border-radius:8px; font-size:14px; font-weight:500; color:#374151; background:#fff; cursor:pointer; transition:all 0.15s;"
                    onmouseover="this.style.background='#f9fafb'; this.style.borderColor='#9ca3af'"
                    onmouseout="this.style.background='#fff'; this.style.borderColor='#d1d5db'">Hủy</button>
                <button type="submit" id="submitStationBtn"
                    style="padding:10px 22px; border:none; border-radius:8px; font-size:14px; font-weight:600; color:#fff; background:linear-gradient(135deg, #3b82f6, #2563eb); cursor:pointer; transition:all 0.15s; box-shadow:0 2px 6px rgba(37,99,235,0.3);"
                    onmouseover="this.style.background='linear-gradient(135deg, #2563eb, #1d4ed8)'; this.style.boxShadow='0 4px 12px rgba(37,99,235,0.4)'"
                    onmouseout="this.style.background='linear-gradient(135deg, #3b82f6, #2563eb)'; this.style.boxShadow='0 2px 6px rgba(37,99,235,0.3)'">Lưu</button>
            </div>
        </form>
    </div>
</div>
