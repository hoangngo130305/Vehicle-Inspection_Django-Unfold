<!-- Hero Header -->
<div class="dk-detail-hero">
    <div class="dk-hero-top">
        <div class="dk-hero-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <line x1="9" y1="3" x2="9" y2="21" />
            </svg>
            {{ original.station_code }}
        </div>
        {% if original.status == "active" %}
        <div class="dk-hero-status dk-hero-status-active">Hoạt động</div>
        {% else %}
        <div class="dk-hero-status dk-hero-status-inactive">Ngừng hoạt động</div>
        {% endif %}
    </div>
    <h1 class="dk-hero-name">{{ original.station_name }}</h1>
    <div class="dk-hero-address">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" />
            <circle cx="12" cy="10" r="3" />
        </svg>
        {{ original.address }}
    </div>
    <div class="dk-hero-actions">
        <a href="../" class="dk-hero-btn dk-hero-btn-white">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <line x1="19" y1="12" x2="5" y2="12" />
                <polyline points="12 19 5 12 12 5" />
            </svg>
            Quay lại danh sách
        </a>
        <a href="history/" class="dk-hero-btn dk-hero-btn-white">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10" />
                <polyline points="12 6 12 12 16 14" />
            </svg>
            Lịch sử thay đổi
        </a>
    </div>
</div>
