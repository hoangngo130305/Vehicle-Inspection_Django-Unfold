<!-- Edit Form Section -->
<div class="dk-edit-section">
    <div class="dk-edit-header">
        <div class="dk-edit-header-left">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#3b82f6" stroke-width="2.5"
                stroke-linecap="round">
                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" />
            </svg>
            <span class="dk-edit-title">Chỉnh sửa thông tin</span>
        </div>
    </div>
    <div class="dk-edit-body">
        <form id="editStationForm" method="post">
            {% csrf_token %}

            <div class="dk-form-grid">
                <div class="dk-form-group">
                    <label class="dk-form-label">Mã trạm</label>
                    <input type="text" class="dk-form-input" value="{{ original.station_code }}" readonly
                        style="background:#f3f4f6; cursor:not-allowed;" />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Tên trạm <span>*</span></label>
                    <input type="text" name="station_name" class="dk-form-input" value="{{ original.station_name }}"
                        required />
                </div>
                <div class="dk-form-group dk-form-group-full">
                    <label class="dk-form-label">Địa chỉ <span>*</span></label>
                    <textarea name="address" class="dk-form-input" required>{{ original.address }}</textarea>
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Số điện thoại <span>*</span></label>
                    <input type="text" name="phone" class="dk-form-input" value="{{ original.phone }}" required />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Email</label>
                    <input type="email" name="email" class="dk-form-input" value="{{ original.email|default:'' }}"
                        placeholder="example@email.com" />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Latitude</label>
                    <input type="number" name="latitude" class="dk-form-input" step="any" min="-90" max="90"
                        value="{{ original.latitude|default:'' }}" />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Longitude</label>
                    <input type="number" name="longitude" class="dk-form-input" step="any" min="-180" max="180"
                        value="{{ original.longitude|default:'' }}" />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Số line kiểm định</label>
                    <input type="number" name="capacity" class="dk-form-input" value="{{ original.capacity }}"
                        min="1" />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Công suất / ngày</label>
                    <input type="number" name="daily_capacity" class="dk-form-input"
                        value="{{ original.daily_capacity }}" min="1" />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Giờ mở cửa</label>
                    <input type="time" name="open_time" class="dk-form-input"
                        value="{{ original.open_time|time:'H:i'|default:'' }}" />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Giờ đóng cửa</label>
                    <input type="time" name="close_time" class="dk-form-input"
                        value="{{ original.close_time|time:'H:i'|default:'' }}" />
                </div>
                <div class="dk-form-group">
                    <label class="dk-form-label">Trạng thái</label>
                    <select name="status" class="dk-form-input dk-form-select">
                        <option value="active" {% if original.status == "active" %}selected{% endif %}>Hoạt động
                        </option>
                        <option value="inactive" {% if original.status == "inactive" %}selected{% endif %}>Ngừng hoạt
                            động</option>
                        <option value="maintenance" {% if original.status == "maintenance" %}selected{% endif %}>Bảo
                            trì</option>
                    </select>
                </div>
            </div>

            <!-- Action Bar -->
            <div class="dk-action-bar" style="margin: 24px -24px -24px; border-radius: 0;">
                <div class="dk-action-bar-left">
                    <button type="button" class="dk-btn-danger"
                        onclick="if(confirm('Bạn có chắc chắn muốn xóa trạm này?')) { window.location.href='delete/'; }">
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" />
                        </svg>
                        Xóa trạm
                    </button>
                </div>
                <div class="dk-action-bar-right">
                    <a href="../" class="dk-btn-secondary">Hủy</a>
                    <button type="submit" name="_continue" class="dk-btn-secondary">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" />
                            <polyline points="17 21 17 13 7 13 7 21" />
                            <polyline points="7 3 7 8 15 8" />
                        </svg>
                        Lưu &amp; Tiếp tục
                    </button>
                    <button type="submit" name="_save" class="dk-btn-save">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <polyline points="20 6 9 17 4 12" />
                        </svg>
                        Lưu thay đổi
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
