<!-- Edit Form -->
<div class="pricing-edit-section">
    <div class="pricing-edit-header">
        <div class="pricing-edit-header-left">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            <span class="pricing-edit-title">Chỉnh sửa bảng giá</span>
        </div>
    </div>
    <div class="pricing-edit-body">
        <form method="post" id="pricingForm">
            {% csrf_token %}
            
            <div class="pricing-form-grid">
                <!-- Vehicle Type -->
                <div class="pricing-form-group">
                    <label class="pricing-form-label">
                        Loại xe <span>*</span>
                    </label>
                    <select 
                        name="vehicle_type" 
                        class="pricing-form-input pricing-form-select"
                        required>
                        {% for vtype in vehicle_types %}
                        <option value="{{ vtype.id }}" {% if vtype.id == original.vehicle_type.id %}selected{% endif %}>
                            {{ vtype.type_name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>

                <!-- Effective From -->
                <div class="pricing-form-group">
                    <label class="pricing-form-label">
                        Hiệu lực từ <span>*</span>
                    </label>
                    <input 
                        type="date" 
                        name="effective_from" 
                        value="{{ original.effective_from|date:'Y-m-d' }}"
                        class="pricing-form-input"
                        required>
                </div>

                <!-- Fee Section -->
                <div class="pricing-fee-section">
                    <div class="pricing-fee-header">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"></line>
                            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        Chi tiết phí (VNĐ)
                    </div>

                    <div class="pricing-fee-grid">
                        <!-- Inspection Fee -->
                        <div class="pricing-form-group">
                            <label class="pricing-form-label">
                                Phí đăng kiểm <span>*</span>
                            </label>
                            <input 
                                type="text" 
                                name="inspection_fee" 
                                id="inspectionFee"
                                value="{{ original.inspection_fee|floatformat:0 }}"
                                class="pricing-form-input"
                                required>
                        </div>

                        <!-- Service Fee -->
                        <div class="pricing-form-group">
                            <label class="pricing-form-label">
                                Phí dịch vụ
                            </label>
                            <input 
                                type="text" 
                                name="service_fee" 
                                id="serviceFee"
                                value="{{ original.service_fee|floatformat:0 }}"
                                class="pricing-form-input">
                        </div>

                        <!-- Registration Fee -->
                        <div class="pricing-form-group">
                            <label class="pricing-form-label">
                                Phí đăng bộ
                            </label>
                            <input 
                                type="text" 
                                name="registration_fee" 
                                id="registrationFee"
                                value="{{ original.registration_fee|floatformat:0 }}"
                                class="pricing-form-input">
                        </div>
                    </div>

                    <!-- Total Display -->
                    <div class="pricing-total-display">
                        <span class="pricing-total-label">Tổng tiền:</span>
                        <span class="pricing-total-amount" id="totalAmountDisplay">{{ original.total_amount|floatformat:0 }}đ</span>
                    </div>
                </div>

                <!-- Status -->
                <div class="pricing-form-group">
                    <label class="pricing-form-label">
                        Trạng thái <span>*</span>
                    </label>
                    <select 
                        name="status" 
                        class="pricing-form-input pricing-form-select"
                        required>
                        <option value="active" {% if original.status == "active" %}selected{% endif %}>Hiệu lực</option>
                        <option value="inactive" {% if original.status == "inactive" %}selected{% endif %}>Hết hạn</option>
                    </select>
                </div>

                <!-- Effective To -->
                <div class="pricing-form-group">
                    <label class="pricing-form-label">
                        Hiệu lực đến (tùy chọn)
                    </label>
                    <input 
                        type="date" 
                        name="effective_to" 
                        value="{% if original.effective_to %}{{ original.effective_to|date:'Y-m-d' }}{% endif %}"
                        class="pricing-form-input">
                </div>
            </div>

            <div class="pricing-timestamps">
                <span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Tạo: {{ original.created_at|date:"d/m/Y H:i" }}
                </span>
                <span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Cập nhật: {{ original.updated_at|date:"d/m/Y H:i" }}
                </span>
            </div>
        </form>
    </div>

    <div class="pricing-action-bar">
        <div class="pricing-action-bar-left">
            <a href="../" class="pricing-btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Quay lại
            </a>
        </div>
        <div class="pricing-action-bar-right">
            <button type="button" class="pricing-btn-danger" onclick="confirmDelete()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                Xóa
            </button>
            <button type="submit" form="pricingForm" class="pricing-btn-save">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                Lưu thay đổi
            </button>
        </div>
    </div>
</div>
