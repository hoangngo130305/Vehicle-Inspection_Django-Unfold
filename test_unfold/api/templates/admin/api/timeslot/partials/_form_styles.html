<!-- Custom Detail Styles -->
<style>
    /* Hide default form */
    #timeslot_form .module,
    #timeslot_form>div,
    .submit-row {
        display: none !important;
    }

    /* ===== Detail Page Container ===== */
    .dk-detail {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ===== Hero Header ===== */
    .dk-detail-hero {
        background: linear-gradient(135deg, #3b82f6 0%, #2563eb 50%, #1d4ed8 100%);
        border-radius: 18px;
        padding: 32px 36px;
        color: #fff;
        margin-bottom: 28px;
        position: relative;
        overflow: hidden;
    }

    .dk-detail-hero::before {
        content: '';
        position: absolute;
        top: -40px;
        right: -40px;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
    }

    .dk-detail-hero::after {
        content: '';
        position: absolute;
        bottom: -50px;
        right: 100px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
    }

    .dk-hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 18px;
        position: relative;
        z-index: 1;
    }

    .dk-hero-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
    }

    .dk-hero-status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 16px;
        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
    }

    .dk-hero-status-active {
        background: rgba(16, 185, 129, 0.25);
    }

    .dk-hero-status-active::before {
        content: '';
        width: 8px;
        height: 8px;
        background: #34d399;
        border-radius: 50%;
    }

    .dk-hero-status-inactive {
        background: rgba(239, 68, 68, 0.25);
    }

    .dk-hero-status-inactive::before {
        content: '';
        width: 8px;
        height: 8px;
        background: #f87171;
        border-radius: 50%;
    }

    .dk-hero-name {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 12px 0;
        position: relative;
        z-index: 1;
    }

    .dk-hero-address {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        opacity: 0.92;
        margin-bottom: 24px;
        position: relative;
        z-index: 1;
    }

    .dk-hero-actions {
        display: flex;
        gap: 12px;
        position: relative;
        z-index: 1;
    }

    .dk-hero-btn {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 9px 18px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        text-decoration: none;
        transition: all 0.2s;
    }

    .dk-hero-btn-white {
        background: rgba(255, 255, 255, 0.18);
        color: #fff;
        backdrop-filter: blur(10px);
    }

    .dk-hero-btn-white:hover {
        background: rgba(255, 255, 255, 0.28);
        transform: translateY(-1px);
    }

    /* ===== Info Cards Grid ===== */
    .dk-info-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
        margin-bottom: 28px;
    }

    .dk-info-card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        overflow: hidden;
    }

    .dk-info-card-header {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 18px 22px;
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
    }

    .dk-info-card-icon {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .dk-info-card-icon-blue {
        background: #dbeafe;
        color: #2563eb;
    }

    .dk-info-card-icon-green {
        background: #d1fae5;
        color: #059669;
    }

    .dk-info-card-icon-purple {
        background: #e9d5ff;
        color: #9333ea;
    }

    .dk-info-card-icon-orange {
        background: #fed7aa;
        color: #ea580c;
    }

    .dk-info-card-title {
        font-size: 15px;
        font-weight: 700;
        color: #111827;
    }

    .dk-info-card-body {
        padding: 20px 22px;
    }

    .dk-info-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        padding: 11px 0;
        border-bottom: 1px solid #f3f4f6;
    }

    .dk-info-row:last-child {
        border-bottom: none;
    }

    .dk-info-label {
        font-size: 13px;
        font-weight: 600;
        color: #6b7280;
        min-width: 120px;
    }

    .dk-info-value {
        font-size: 14px;
        font-weight: 500;
        color: #1f2937;
        text-align: right;
        flex: 1;
    }

    .dk-info-value a {
        color: #2563eb;
        text-decoration: none;
    }

    .dk-info-value a:hover {
        text-decoration: underline;
    }

    .dk-stat-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 14px;
    }

    .dk-stat-box {
        background: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 16px;
        text-align: center;
    }

    .dk-stat-number {
        font-size: 28px;
        font-weight: 800;
        color: #111827;
        margin-bottom: 6px;
    }

    .dk-stat-label {
        font-size: 12px;
        font-weight: 600;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .dk-map-container {
        background: #f0f9ff;
        border: 1px solid #bfdbfe;
        border-radius: 10px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
    }

    .dk-map-link {
        font-size: 13px;
        font-weight: 600;
        color: #2563eb;
        text-decoration: none;
    }

    .dk-map-link:hover {
        text-decoration: underline;
    }

    /* ===== Edit Section ===== */
    .dk-edit-section {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        overflow: hidden;
    }

    .dk-edit-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
    }

    .dk-edit-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .dk-edit-title {
        font-size: 16px;
        font-weight: 700;
        color: #111827;
    }

    .dk-edit-body {
        padding: 24px;
    }

    /* ===== Form Styles ===== */
    .dk-form-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px;
    }

    .dk-form-group {
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .dk-form-group-full {
        grid-column: 1 / -1;
    }

    .dk-form-label {
        font-size: 14px;
        font-weight: 600;
        color: #374151;
    }

    .dk-form-label span {
        color: #ef4444;
    }

    .dk-form-input {
        width: 100%;
        padding: 10px 14px;
        font-size: 14px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        transition: all 0.2s;
    }

    .dk-form-input:focus {
        outline: none;
        border-color: #3b82f6;
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .dk-form-input::placeholder {
        color: #9ca3af;
    }

    textarea.dk-form-input {
        min-height: 100px;
        resize: vertical;
        font-family: inherit;
    }

    .dk-form-select {
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
        background-position: right 10px center;
        background-repeat: no-repeat;
        background-size: 1.5em 1.5em;
        padding-right: 40px;
        appearance: none;
    }

    input[type="checkbox"] {
        width: 18px;
        height: 18px;
        border: 1px solid #d1d5db;
        border-radius: 4px;
        cursor: pointer;
    }

    .dk-form-hint {
        font-size: 12px;
        color: #6b7280;
        font-style: italic;
    }

    .dk-form-error {
        font-size: 13px;
        color: #dc2626;
        font-weight: 500;
    }

    /* ===== Action Bar ===== */
    .dk-action-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 24px;
        background: #f9fafb;
        border-top: 1px solid #e5e7eb;
        border-radius: 0 0 14px 14px;
    }

    .dk-action-bar-left,
    .dk-action-bar-right {
        display: flex;
        gap: 12px;
    }

    .dk-btn-save {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 20px;
        background: #3b82f6;
        color: #fff;
        border: none;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .dk-btn-save:hover {
        background: #2563eb;
        transform: translateY(-1px);
        box-shadow: 0 4px 6px -1px rgba(59, 130, 246, 0.3);
    }

    .dk-btn-secondary {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 20px;
        background: #fff;
        color: #374151;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.2s;
    }

    .dk-btn-secondary:hover {
        background: #f9fafb;
        border-color: #9ca3af;
    }

    .dk-btn-danger {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 10px 20px;
        background: #fff;
        color: #dc2626;
        border: 1px solid #fecaca;
        border-radius: 8px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
    }

    .dk-btn-danger:hover {
        background: #fef2f2;
        border-color: #ef4444;
    }

    /* Responsive */
    @media (max-width: 1024px) {
        .dk-info-grid {
            grid-template-columns: 1fr;
        }

        .dk-form-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
