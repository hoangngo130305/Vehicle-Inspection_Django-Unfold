{% extends "admin/change_list.html" %}

{% block extrahead %}
{{ block.super }}
<style>
    /* ===== STAFF ASSIGNMENT BUTTON (Gradient Purple) ===== */
    .staff-assignment-cell button {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s ease;
        box-shadow: 0 2px 8px rgba(102, 126, 234, 0.25);
    }
    
    .staff-assignment-cell button:hover {
        transform: translateY(-2px);
        box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .staff-assignment-cell button svg {
        width: 16px;
        height: 16px;
    }
    
    .staff-assigned-text {
        color: #059669;
        font-weight: 600;
        font-size: 14px;
    }
    
    /* ===== MODAL OVERLAY (như AdminOrdersScreen.tsx) ===== */
    #staffModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        z-index: 9999;
        align-items: center;
        justify-content: center;
        padding: 16px;
    }
    
    #staffModal.active {
        display: flex;
    }
    
    /* ===== MODAL CONTAINER (max-width 640px như tsx) ===== */
    .modal-content {
        background: white;
        border-radius: 12px;
        max-width: 640px;
        width: 100%;
        max-height: 90vh;
        display: flex;
        flex-direction: column;
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        animation: modalSlideIn 0.3s ease-out;
    }
    
    @keyframes modalSlideIn {
        from {
            transform: translateY(-20px);
            opacity: 0;
        }
        to {
            transform: translateY(0);
            opacity: 1;
        }
    }
    
    /* ===== MODAL HEADER (px-6 py-4) ===== */
    .modal-header {
        padding: 1.5rem;
        border-bottom: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    
    .modal-header h2 {
        font-size: 1.125rem;
        font-weight: 700;
        color: #111827;
        margin: 0;
    }
    
    .modal-header p {
        font-size: 0.875rem;
        color: #6b7280;
        margin: 0.25rem 0 0 0;
    }
    
    .order-code-highlight {
        font-weight: 600;
        color: #2563eb;
    }
    
    .close-btn {
        padding: 0.5rem;
        border: none;
        background: transparent;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: background-color 0.2s;
    }
    
    .close-btn:hover {
        background-color: #f3f4f6;
    }
    
    .close-btn svg {
        width: 20px;
        height: 20px;
        color: #6b7280;
    }
    
    /* ===== MODAL BODY (px-6 py-4) ===== */
    .modal-body {
        padding: 1.5rem;
        overflow-y: auto;
        max-height: calc(90vh - 180px);
        flex: 1;
    }
    
    /* Assignment Mode Selection */
    .assignment-mode-section {
        margin-bottom: 1.5rem;
    }
    
    .section-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 600;
        color: #374151;
        margin-bottom: 0.75rem;
    }
    
    .mode-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 0.75rem;
    }
    
    /* Manual Mode Card (Active - Blue) */
    .mode-card-manual {
        padding: 1rem;
        border-radius: 0.75rem;
        border: 2px solid #2563eb;
        background-color: #eff6ff;
    }
    
    .mode-card-content {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 0.75rem;
    }
    
    .mode-icon-manual {
        width: 40px;
        height: 40px;
        background-color: #2563eb;
        border-radius: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .mode-icon-manual svg {
        width: 20px;
        height: 20px;
        color: white;
    }
    
    .mode-text h3 {
        font-size: 0.875rem;
        font-weight: 700;
        color: #111827;
        margin: 0 0 0.125rem 0;
    }
    
    .mode-text p {
        font-size: 0.75rem;
        color: #6b7280;
        margin: 0;
    }
    
    /* Random Mode Card (Hover Green) */
    .mode-card-random {
        padding: 1rem;
        border-radius: 0.75rem;
        border: 2px solid #e5e7eb;
        background-color: white;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .mode-card-random:hover {
        border-color: #10b981;
        background-color: #f0fdf4;
    }
    
    .mode-icon-random {
        width: 40px;
        height: 40px;
        background-color: #e5e7eb;
        border-radius: 0.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }
    
    .mode-card-random:hover .mode-icon-random {
        background-color: #10b981;
    }
    
    .mode-icon-random svg {
        width: 20px;
        height: 20px;
        color: #6b7280;
        transition: all 0.2s;
    }
    
    .mode-card-random:hover .mode-icon-random svg {
        color: white;
    }
    
    /* Staff List Section */
    .staff-section {
        margin-top: 1.5rem;
    }
    
    .staff-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
    }
    
    .staff-item {
        padding: 1rem;
        border: 2px solid #e5e7eb;
        border-radius: 0.75rem;
        cursor: pointer;
        transition: all 0.2s;
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: white;
    }
    
    .staff-item:hover:not(.disabled) {
        border-color: #2563eb;
        background-color: #eff6ff;
    }
    
    .staff-item.disabled {
        opacity: 0.5;
        cursor: not-allowed;
        background-color: #f9fafb;
    }
    
    .staff-left {
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }
    
    .staff-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: #dbeafe;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    
    .staff-avatar span {
        color: #2563eb;
        font-weight: 700;
        font-size: 0.875rem;
    }
    
    .staff-info h4 {
        font-size: 0.875rem;
        font-weight: 600;
        color: #111827;
        margin: 0 0 0.25rem 0;
    }
    
    .staff-info p {
        font-size: 0.75rem;
        color: #6b7280;
        margin: 0;
    }
    
    .staff-badge {
        padding: 0.375rem 0.75rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 600;
        white-space: nowrap;
    }
    
    .staff-badge.active {
        background-color: #d1fae5;
        color: #065f46;
    }
    
    .staff-badge.inactive {
        background-color: #fee2e2;
        color: #991b1b;
    }
    
    /* ===== MODAL FOOTER (px-6 py-4) ===== */
    .modal-footer {
        padding: 1rem 1.5rem;
        border-top: 1px solid #e5e7eb;
        display: flex;
        justify-content: flex-end;
        gap: 0.75rem;
    }
    
    .btn-close {
        padding: 0.5rem 1rem;
        border: 1px solid #d1d5db;
        background-color: white;
        color: #374151;
        border-radius: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
    }
    
    .btn-close:hover {
        background-color: #f9fafb;
    }
    
    /* Loading State */
    .loading {
        text-align: center;
        padding: 3rem 1.5rem;
        color: #6b7280;
    }
    
    .loading-spinner {
        width: 48px;
        height: 48px;
        border: 4px solid #e5e7eb;
        border-top-color: #2563eb;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
    }
    
    @keyframes spin {
        to {
            transform: rotate(360deg);
        }
    }
</style>

<script>
(function() {
    let currentOrderId = null;
    let currentOrderCode = null;
    
    // SVG Icons
    const ICONS = {
        close: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>',
        userCheck: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>',
        shuffle: '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16V4m0 0L3 8m4-4l4 4m6 0v12m0 0l4-4m-4 4l-4-4"></path></svg>'
    };
    
    // Create modal HTML (giống y chang AdminOrdersScreen.tsx)
    const modalHTML = `
        <div id="staffModal">
            <div class="modal-content">
                <!-- Header -->
                <div class="modal-header">
                    <div>
                        <h2>Phân công nhân viên</h2>
                        <p>Đơn hàng: <span class="order-code-highlight" id="modalOrderCode">-</span></p>
                    </div>
                    <button class="close-btn" onclick="closeStaffModal()">
                        ${ICONS.close}
                    </button>
                </div>
                
                <!-- Body -->
                <div class="modal-body">
                    <div id="loadingState" class="loading">
                        <div class="loading-spinner"></div>
                        <p>Đang tải danh sách nhân viên...</p>
                    </div>
                    
                    <div id="mainContent" style="display: none;">
                        <!-- Assignment Mode Selection -->
                        <div class="assignment-mode-section">
                            <label class="section-label">Chọn phương thức phân công</label>
                            <div class="mode-grid">
                                <!-- Manual Assignment (Active) -->
                                <div class="mode-card-manual">
                                    <div class="mode-card-content">
                                        <div class="mode-icon-manual">
                                            ${ICONS.userCheck}
                                        </div>
                                        <div class="mode-text">
                                            <h3>Phân công thủ công</h3>
                                            <p>Chọn nhân viên cụ thể</p>
                                        </div>
                                    </div>
                                </div>
                                
                                <!-- Random Assignment -->
                                <div class="mode-card-random" id="randomAssignBtn">
                                    <div class="mode-card-content">
                                        <div class="mode-icon-random">
                                            ${ICONS.shuffle}
                                        </div>
                                        <div class="mode-text">
                                            <h3>Phân công ngẫu nhiên</h3>
                                            <p>Tự động chọn nhân viên rảnh</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Staff List -->
                        <div class="staff-section">
                            <label class="section-label">Danh sách nhân viên</label>
                            <div class="staff-list" id="staffListContainer"></div>
                        </div>
                    </div>
                </div>
                
                <!-- Footer -->
                <div class="modal-footer">
                    <button class="btn-close" onclick="closeStaffModal()">Đóng</button>
                </div>
            </div>
        </div>
    `;
    
    // Insert modal into DOM when ready
    document.addEventListener('DOMContentLoaded', function() {
        document.body.insertAdjacentHTML('beforeend', modalHTML);
        
        // Close modal when clicking overlay
        document.getElementById('staffModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeStaffModal();
            }
        });
        
        // Random assign button
        const randomBtn = document.getElementById('randomAssignBtn');
        if (randomBtn) {
            randomBtn.addEventListener('click', handleRandomAssign);
        }
        
        // Handle "Phân công" button clicks
        document.addEventListener('click', function(e) {
            const btn = e.target.closest('[data-action="assign-staff"]');
            if (btn) {
                e.preventDefault();
                e.stopPropagation();
                openStaffModal(btn.dataset.orderId, btn.dataset.orderCode);
            }
        });
    });
    
    // Open modal
    function openStaffModal(orderId, orderCode) {
        currentOrderId = orderId;
        currentOrderCode = orderCode;
        
        document.getElementById('modalOrderCode').textContent = orderCode;
        document.getElementById('staffModal').classList.add('active');
        loadStaffList();
    }
    
    // Close modal
    window.closeStaffModal = function() {
        document.getElementById('staffModal').classList.remove('active');
        document.getElementById('loadingState').style.display = 'block';
        document.getElementById('mainContent').style.display = 'none';
    };
    
    // Load staff list from API
    async function loadStaffList() {
        try {
            // ✅ FIX: Dùng Django Admin endpoint thay vì public API
            // Add timestamp to bypass cache
            const timestamp = new Date().getTime();
            const response = await fetch(`/admin/api/order/get-staff-list/?t=${timestamp}`);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const data = await response.json();
            
            // ✅ Handle both paginated and non-paginated responses
            let staffList = [];
            if (Array.isArray(data)) {
                // Non-paginated response
                staffList = data;
            } else if (data.results && Array.isArray(data.results)) {
                // Paginated response (DRF default)
                staffList = data.results;
            } else {
                throw new Error('Invalid staff data format');
            }
            
            // Hide loading, show content
            document.getElementById('loadingState').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            
            // Render staff list (giống AdminOrdersScreen.tsx)
            const container = document.getElementById('staffListContainer');
            container.innerHTML = staffList.map(staff => {
                const isActive = staff.status === 'active';
                const initials = staff.full_name.charAt(0).toUpperCase();
                
                return `
                    <div class="staff-item ${!isActive ? 'disabled' : ''}" 
                         ${isActive ? `onclick=\"assignStaff(${staff.id}, '${staff.full_name}')\"` : ''}> 
                        <div class="staff-left">
                            <div class="staff-avatar">
                                <span>${initials}</span>
                            </div>
                            <div class="staff-info">
                                <h4>${staff.full_name}</h4>
                                <p>${staff.role_name || 'Nhân viên đăng kiểm'}</p>
                            </div>
                        </div>
                        <span class="staff-badge ${isActive ? 'active' : 'inactive'}">
                            ${isActive ? '🟢 Hoạt động' : '🔴 Không hoạt động'}
                        </span>
                    </div>
                `;
            }).join('');
            
        } catch (error) {
            console.error('Error loading staff:', error);
            document.getElementById('loadingState').innerHTML = `
                <p style="color: #dc2626;">❌ Lỗi tải danh sách nhân viên: ${error.message}</p>
            `;
        }
    }
    
    // Assign staff
    window.assignStaff = async function(staffId, staffName) {
        if (!confirm(`Phân công ${staffName} cho đơn hàng ${currentOrderCode}?`)) {
            return;
        }
        
        try {
            const formData = new FormData();
            formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));
            formData.append('order_id', currentOrderId);
            formData.append('staff_id', staffId);
            
            const response = await fetch('/admin/api/order/assign-staff/', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });
            
            const data = await response.json();
            
            if (data.success) {
                alert(`✅ ${data.message}`);
                location.reload();
            } else {
                alert(`❌ Lỗi: ${data.error}`);
            }
        } catch (error) {
            console.error('Error assigning staff:', error);
            alert('❌ Lỗi khi phân công nhân viên');
        }
    };
    
    // Random assign
    async function handleRandomAssign() {
        // ✅ FIX: Kiểm tra xem đã chọn order chưa
        if (!currentOrderId) {
            alert('⚠️ Vui lòng chọn một đơn hàng trước khi phân công ngẫu nhiên!');
            return;
        }
        
        if (!confirm(`Phân công ngẫu nhiên cho đơn hàng ${currentOrderCode}?`)) {
            return;
        }
        
        try {
            const formData = new FormData();
            formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));
            formData.append('order_id', currentOrderId);
            
            const response = await fetch('/admin/api/order/random-assign-staff/', {
                method: 'POST',
                body: formData,
                headers: {
                    'X-CSRFToken': getCookie('csrftoken')
                }
            });
            
            const data = await response.json();
            
            if (data.success) {
                alert(`✅ ${data.message}`);
                closeStaffModal();  // ✅ Close modal after success
                location.reload();
            } else {
                alert(`❌ Lỗi: ${data.error}`);
            }
        } catch (error) {
            console.error('Error random assigning:', error);
            alert('❌ Lỗi khi phân công ngẫu nhiên');
        }
    }
    
    // Get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
})();
</script>
{% endblock %}
