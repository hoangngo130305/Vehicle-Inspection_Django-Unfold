<script>
function confirmDelete() {
    if (confirm('Bạn có chắc muốn xóa mục checklist này không?\n\nHành động này không thể hoàn tác.')) {
        const deleteUrl = 'delete/';
        const form = document.createElement('form');
        form.method = 'POST';
        form.action = deleteUrl;
        
        const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;
        const csrfInput = document.createElement('input');
        csrfInput.type = 'hidden';
        csrfInput.name = 'csrfmiddlewaretoken';
        csrfInput.value = csrfToken;
        form.appendChild(csrfInput);
        
        const confirmInput = document.createElement('input');
        confirmInput.type = 'hidden';
        confirmInput.name = 'post';
        confirmInput.value = 'yes';
        form.appendChild(confirmInput);
        
        document.body.appendChild(form);
        form.submit();
    }
}

// Form validation
document.getElementById('checklistItemForm').addEventListener('submit', function(e) {
    const itemKey = document.querySelector('[name="item_key"]').value.trim();
    const itemLabel = document.querySelector('[name="item_label"]').value.trim();
    const displayOrder = document.querySelector('[name="display_order"]').value;
    
    if (!itemKey || !itemLabel || !displayOrder) {
        e.preventDefault();
        alert('Vui lòng điền đầy đủ các trường bắt buộc!');
        return false;
    }
    
    // Validate item_key format (alphanumeric and underscore only)
    const keyPattern = /^[a-z0-9_]+$/;
    if (!keyPattern.test(itemKey)) {
        e.preventDefault();
        alert('Item Key chỉ được chứa chữ thường, số và dấu gạch dưới (_)!');
        return false;
    }
});
</script>
