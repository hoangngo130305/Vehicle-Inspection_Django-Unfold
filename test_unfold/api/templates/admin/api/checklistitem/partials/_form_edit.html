<!-- Edit Form -->
<div class="checklist-edit-section">
    <div class="checklist-edit-header">
        <div class="checklist-edit-header-left">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
            <span class="checklist-edit-title">Chỉnh sửa thông tin</span>
        </div>
    </div>
    <div class="checklist-edit-body">
        <form method="post" id="checklistItemForm">
            {% csrf_token %}
            
            <div class="checklist-form-grid">
                <!-- Item Key -->
                <div class="checklist-form-group">
                    <label class="checklist-form-label">
                        Item Key <span>*</span>
                    </label>
                    <input 
                        type="text" 
                        name="item_key" 
                        value="{{ original.item_key }}"
                        class="checklist-form-input"
                        required>
                </div>

                <!-- Item Label -->
                <div class="checklist-form-group">
                    <label class="checklist-form-label">
                        Mô tả <span>*</span>
                    </label>
                    <input 
                        type="text" 
                        name="item_label" 
                        value="{{ original.item_label }}"
                        class="checklist-form-input"
                        required>
                </div>

                <!-- Category -->
                <div class="checklist-form-group">
                    <label class="checklist-form-label">
                        Danh mục <span>*</span>
                    </label>
                    <select 
                        name="category" 
                        class="checklist-form-input checklist-form-select"
                        required>
                        <option value="safety" {% if original.category == "safety" %}selected{% endif %}>An toàn</option>
                        <option value="emission" {% if original.category == "emission" %}selected{% endif %}>Khí thải</option>
                        <option value="both" {% if original.category == "both" %}selected{% endif %}>Cả hai</option>
                    </select>
                </div>

                <!-- Display Order -->
                <div class="checklist-form-group">
                    <label class="checklist-form-label">
                        Thứ tự hiển thị <span>*</span>
                    </label>
                    <input 
                        type="number" 
                        name="display_order" 
                        value="{{ original.display_order }}"
                        class="checklist-form-input"
                        required>
                </div>

                <!-- Require Photo -->
                <div class="checklist-form-group checklist-form-group-full">
                    <div class="checklist-form-checkbox">
                        <input 
                            type="checkbox" 
                            name="require_photo" 
                            id="requirePhoto"
                            {% if original.require_photo %}checked{% endif %}>
                        <label for="requirePhoto">Yêu cầu chụp ảnh minh chứng</label>
                    </div>
                </div>

                <!-- Status -->
                <div class="checklist-form-group checklist-form-group-full">
                    <label class="checklist-form-label">
                        Trạng thái <span>*</span>
                    </label>
                    <select 
                        name="status" 
                        class="checklist-form-input checklist-form-select"
                        required>
                        <option value="active" {% if original.status == "active" %}selected{% endif %}>Hoạt động</option>
                        <option value="inactive" {% if original.status == "inactive" %}selected{% endif %}>Không hoạt động</option>
                    </select>
                </div>
            </div>

            <div class="checklist-timestamps">
                <span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Tạo: {{ original.created_at|date:"d/m/Y H:i" }}
                </span>
                <span>
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="10"></circle>
                        <polyline points="12 6 12 12 16 14"></polyline>
                    </svg>
                    Cập nhật: {{ original.updated_at|date:"d/m/Y H:i" }}
                </span>
            </div>
        </form>
    </div>

    <div class="checklist-action-bar">
        <div class="checklist-action-bar-left">
            <a href="../" class="checklist-btn-secondary">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                Quay lại
            </a>
        </div>
        <div class="checklist-action-bar-right">
            <button type="button" class="checklist-btn-danger" onclick="confirmDelete()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <polyline points="3 6 5 6 21 6"></polyline>
                    <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
                Xóa
            </button>
            <button type="submit" form="checklistItemForm" class="checklist-btn-save">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                    <polyline points="17 21 17 13 7 13 7 21"></polyline>
                    <polyline points="7 3 7 8 15 8"></polyline>
                </svg>
                Lưu thay đổi
            </button>
        </div>
    </div>
</div>
