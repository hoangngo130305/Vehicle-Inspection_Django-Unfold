<!-- Custom Vehicle Detail Styles -->
<style>

    .vehicle-detail {

    .vehicle-hero {

        color: #fff;

        position: relative;
        overflow: hidden;

    .vehicle-hero::before {

        position: absolute;
        top: -10px;
        right: 30px;
        font-size: 120px;
        opacity: 0.08;
    }

    .vehicle-hero::after {
        content: '';
        position: absolute;
        bottom: -50px;
        right: 100px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);

    .vehicle-hero-top {

        z-index: 1;

        align-items: center;
        gap: 6px;

        border-radius: 20px;
        font-size: 13px;
        font-weight: 600;
    }

    .vehicle-hero-status {
        display: inline-flex;

        gap: 6px;
        padding: 6px 16px;
        border-radius: 20px;

        font-weight: 600;

        background: rgba(239, 68, 68, 0.25);
